# Render Blueprint — free-tier FastAPI backend
# Dashboard: New > Blueprint > connect this repo
services:
  - type: web
    name: plum-claims-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: DATABASE_URL
        value: sqlite:///./.data/claims.db
      - key: CORS_ORIGIN_REGEX
        value: https://.*\.vercel\.app
      - key: GEMINI_API_KEY
        sync: false
